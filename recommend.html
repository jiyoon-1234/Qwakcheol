<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>맞춤 맛집 추천</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f8; color: #1a1a1a; min-height: 100vh; }
.container { max-width: 640px; margin: 0 auto; padding: 1.5rem; }
header { margin-bottom: 1.5rem; }
h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: #666; }

/* 설문 요약 배너 */
.survey-banner { background: #E1F5EE; border: 1px solid #1D9E75; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; font-size: 13px; }
.survey-banner-title { font-weight: 600; color: #0F6E56; margin-bottom: 6px; font-size: 13px; }
.tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #fff; color: #0F6E56; border: 1px solid #1D9E75; margin: 2px; }
.tag.warn { background: #FAECE7; color: #993C1D; border-color: #e87c5a; }
.tag.dis { background: #F5F5F5; color: #555; border-color: #ddd; }
.btn-back { font-size: 12px; color: #0F6E56; background: none; border: 1px solid #1D9E75; border-radius: 6px; padding: 4px 10px; cursor: pointer; margin-top: 8px; }

/* 로딩 */
.loading { text-align: center; padding: 4rem 0; }
.spinner { width: 36px; height: 36px; border: 3px solid #e0e0e0; border-top-color: #1D9E75; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: #666; }
.loading-sub { font-size: 12px; color: #aaa; margin-top: 4px; }

/* 에러 */
.error-box { background: #FAECE7; border: 1px solid #e87c5a; border-radius: 12px; padding: 1.25rem; text-align: center; }
.error-box p { font-size: 14px; color: #993C1D; margin-bottom: 8px; }

/* 결과 카드 */
.result-section { margin-bottom: 1rem; }
.section-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.75rem; font-weight: 500; }
.card { background: #fff; border: 1px solid #e8e8e6; border-radius: 12px; padding: 1.1rem 1.25rem; margin-bottom: 0.85rem; }
.card.top1 { border: 2px solid #185FA5; }
.card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.rank { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
.rank-1 { background: #B5D4F4; color: #042C53; }
.rank-2 { background: #D3D1C7; color: #2C2C2A; }
.rank-3 { background: #FAC775; color: #412402; }
.card-title { font-size: 16px; font-weight: 600; color: #1a1a1a; }
.badge-best { background: #185FA5; color: #E6F1FB; font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 500; margin-left: 4px; }
.card-sub { font-size: 12px; color: #888; margin-top: 1px; }
.meta-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; font-size: 12px; color: #666; }
.divider { border: none; border-top: 1px solid #f0f0ee; margin: 10px 0; }
.reason-title { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
.pill-row { display: flex; flex-wrap: wrap; gap: 5px; }
.pill { font-size: 11px; padding: 3px 9px; border-radius: 999px; border: 1px solid #e0e0e0; color: #555; }
.pill.green { background: #EAF3DE; color: #27500A; border-color: #C0DD97; }
.pill.amber { background: #FAEEDA; color: #633806; border-color: #FAC775; }

/* 하단 버튼 */
.footer-btns { margin-top: 1.5rem; display: flex; flex-direction: column; gap: 8px; }
.btn-primary { width: 100%; padding: 13px; background: #1D9E75; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; }
.btn-primary:hover { background: #0F6E56; }
.btn-secondary { width: 100%; padding: 11px; background: #fff; border: 1px solid #ddd; border-radius: 10px; font-size: 13px; color: #555; cursor: pointer; }
.btn-secondary:hover { background: #f5f5f5; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🍽 맞춤 맛집 추천</h1>
    <p class="subtitle">설문 결과를 바탕으로 AI가 추천해드려요</p>
  </header>

  <!-- 설문 요약 배너 -->
  <div id="survey-banner" class="survey-banner" style="display:none">
    <div class="survey-banner-title">📋 설문 참여자 취향 요약</div>
    <div id="banner-body"></div>
    <button class="btn-back" onclick="location.href='food_survey.html'">← 설문 페이지로</button>
  </div>

  <!-- 로딩 -->
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <div class="loading-text">AI가 맞춤 맛집을 분석 중이에요...</div>
    <div class="loading-sub" id="loading-sub">설문 데이터를 읽는 중</div>
  </div>

  <!-- 에러 -->
  <div id="error-box" class="error-box" style="display:none">
    <p id="error-msg">추천을 불러오는 데 실패했어요.</p>
    <button class="btn-secondary" onclick="runRecommend()">다시 시도</button>
  </div>

  <!-- 결과 -->
  <div id="result" style="display:none">
    <div class="section-label" id="result-label"></div>
    <div id="cards"></div>
    <div class="footer-btns">
      <button class="btn-primary" onclick="location.href='food_survey.html'">+ 설문 다시 하기</button>
      <button class="btn-secondary" onclick="runRecommend()">🔄 다시 추천받기</button>
    </div>
  </div>
</div>

<script>
const LOCATION = '경기도 안산시 상록구 장하동 351-1';
const BUDGET = '14,000원 (최대 16,000원)';
const WALKTIME = '도보 10분 이내';
const RETURN_TIME = '12:55';

function showBanner(responses) {
  const banner = document.getElementById('survey-banner');
  const body = document.getElementById('banner-body');
  banner.style.display = 'block';

  const names = responses.map(r => r.name).join(', ');
  const allPrefs = responses.flatMap(r => r.prefs);
  const prefCount = {};
  allPrefs.forEach(p => { prefCount[p] = (prefCount[p]||0)+1; });
  const topPrefs = Object.entries(prefCount).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([k])=>k);
  const allergies = responses.filter(r => r.allergies.some(a => a !== '없음'));

  let html = `<strong>${responses.length}명</strong> 참여 · `;
  html += topPrefs.map(p => `<span class="tag">${p}</span>`).join('');
  if (allergies.length) {
    html += `<br>⚠️ 알러지: ` + allergies.map(r =>
      `<span class="tag warn">${r.name}(${r.allergies.filter(a=>a!=='없음').join(',')})</span>`
    ).join('');
  }
  body.innerHTML = html;
}

function buildPrompt(responses) {
  const lines = responses.map(r => {
    const prefs = r.prefs.length ? r.prefs.join(', ') : '없음';
    const dislikes = r.dislikes.filter(d=>d!=='없음').join(', ') || '없음';
    const allergies = r.allergies.filter(a=>a!=='없음').join(', ') || '없음';
    const restricts = r.restricts.filter(a=>a!=='없음').join(', ') || '없음';
    const note = r.note || '';
    return `- ${r.name}: 선호(${prefs}), 비선호(${dislikes}), 알러지(${allergies}), 식이제약(${restricts})${note ? ', 비고: '+note : ''}`;
  }).join('\n');

  return `당신은 점심 맛집 추천 전문가입니다.
아래 조건과 팀원들의 식품 취향을 분석해서 최적의 맛집 TOP 3를 추천해주세요.

[조건]
- 위치: ${LOCATION} 근처
- 예산: ${BUDGET}
- 이동: ${WALKTIME}
- 복귀: ${RETURN_TIME}까지

[팀원 취향 (${responses.length}명)]
${lines}

다음 JSON 형식으로만 응답하세요. 다른 텍스트는 절대 포함하지 마세요:
{
  "summary": "팀 전체 취향 한줄 요약 (예: 한식/중식 선호, 해산물 주의)",
  "restaurants": [
    {
      "rank": 1,
      "name": "식당명",
      "category": "음식 종류 · 대표메뉴",
      "walk": "도보 약 N분",
      "price": "가격대",
      "reasons": ["선택 이유1", "선택 이유2", "선택 이유3"],
      "cautions": ["주의사항1"],
      "best": true
    },
    { "rank": 2, ... "best": false },
    { "rank": 3, ... "best": false }
  ]
}`;
}

async function runRecommend() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('result').style.display = 'none';
  document.getElementById('error-box').style.display = 'none';

  // 설문 데이터 읽기
  let responses = [];
  try {
    const raw = sessionStorage.getItem('survey_responses') || localStorage.getItem('food_survey_v1');
    if (raw) responses = JSON.parse(raw);
  } catch(e) {}

  if (!responses || responses.length === 0) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-box').style.display = 'block';
    document.getElementById('error-msg').textContent = '설문 데이터가 없어요. 먼저 설문을 작성해 주세요.';
    return;
  }

  showBanner(responses);
  document.getElementById('loading-sub').textContent = `${responses.length}명의 취향을 분석 중`;

  try {
    const res = await fetch('/api/recommend', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content: buildPrompt(responses) }]
      })
    });

    const data = await res.json();
    const text = data.content?.[0]?.text || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);

    renderResult(result, responses.length);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-box').style.display = 'block';
    document.getElementById('error-msg').textContent = '추천 생성 중 오류가 발생했어요: ' + e.message;
  }
}

function renderResult(data, count) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  document.getElementById('result-label').textContent =
    `${count}명 취향 분석 완료 · ${data.summary}`;

  const rankClass = ['rank-1','rank-2','rank-3'];
  const cards = data.restaurants.map((r, i) => `
    <div class="card ${r.best ? 'top1' : ''}">
      <div class="card-header">
        <div class="rank ${rankClass[i]}">${r.rank}</div>
        <div>
          <div class="card-title">${r.name}${r.best ? '<span class="badge-best">최추천</span>' : ''}</div>
          <div class="card-sub">${r.category}</div>
        </div>
      </div>
      <div class="meta-row">
        <span>🚶 ${r.walk}</span>
        <span>💰 ${r.price}</span>
      </div>
      <hr class="divider">
      <div class="reason-title">선택 근거</div>
      <div class="pill-row">
        ${(r.reasons||[]).map(t=>`<span class="pill green">${t}</span>`).join('')}
        ${(r.cautions||[]).map(t=>`<span class="pill amber">${t}</span>`).join('')}
      </div>
    </div>
  `).join('');

  document.getElementById('cards').innerHTML = cards;
}

// 페이지 로드 시 자동 실행
runRecommend();
</script>
</body>
</html>
